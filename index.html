<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speaking Patterns 1-10 • အင်္ဂလိပ်စကားပြောပုံစံများ</title>
    <!-- Google Fonts & modern reset -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00b4d8;
            --primary-dark: #0096c7;
            --secondary: #0077b6;
            --accent: #f72585;
            --success: #06d6a0;
            --warning: #ffd166;
            --danger: #ef476f;
            --dark: #2b2d42;
            --light: #f8f9fa;
            --gray-100: #e9ecef;
            --gray-200: #dee2e6;
            --gray-300: #ced4da;
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.07);
            --shadow-md: 0 10px 15px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px rgba(0, 0, 0, 0.15);
            --radius: 20px;
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #03045e 0%, #0077b6 100%);
            min-height: 100vh;
            width: 100%;
            margin: 0;
            padding: 20px;
            line-height: 1.7;
            color: var(--dark);
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 30px 25px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            transition: var(--transition);
            min-height: 90vh;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #00b4d8, #0077b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid var(--primary);
        }

        h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 25px;
            position: relative;
            padding-bottom: 12px;
            color: var(--primary-dark);
        }
        h2:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 70px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 3px;
        }

        h3 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 20px 0 15px;
            color: var(--primary-dark);
        }

        h4 {
            font-size: 1.3rem;
            color: var(--primary);
            margin-bottom: 12px;
            border-bottom: 2px dashed var(--gray-300);
            padding-bottom: 8px;
        }

        /* Main Menu Button */
        .btn-speaking-main {
            background: linear-gradient(145deg, #00b4d8, #0077b6);
            font-size: 1.3rem;
            padding: 16px 30px;
            margin: 20px auto;
            width: 100%;
            max-width: 350px;
            display: block;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-speaking-main:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: var(--shadow-lg);
            background: linear-gradient(145deg, #0077b6, #03045e);
        }

        /* Pattern Grid Buttons */
        .pattern-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin: 25px 0;
            width: 100%;
        }
        .btn-pattern {
            background: linear-gradient(145deg, #00b4d8, #0096c7);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            padding: 16px 8px;
            border: none;
            border-radius: 50px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            width: 100%;
            cursor: pointer;
        }
        .btn-pattern:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            background: linear-gradient(145deg, #0096c7, #0077b6);
        }

        /* Back button */
        .btn-back {
            background: linear-gradient(145deg, #ff4444, #aa0000);
            color: white;
            padding: 14px 20px;
            margin: 5px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            display: inline-block;
        }
        .btn-back:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: var(--shadow-lg);
        }

        /* Content Area */
        #contentArea {
            min-height: 350px;
            margin-bottom: 25px;
            background: white;
            padding: 25px 20px;
            border-radius: 24px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02), 0 10px 20px -10px rgba(0,119,182,0.15);
            font-size: 1rem;
            width: 100%;
        }

        /* Example Box */
        .example-box {
            background: linear-gradient(145deg, #f2f7ff, #e9f2ff);
            border-left: 6px solid var(--accent);
            padding: 18px;
            border-radius: 20px;
            margin: 25px 0 10px;
            box-shadow: 0 8px 12px -8px rgba(247,37,133,0.15);
            width: 100%;
        }
        .example-box strong:first-child { 
            color: var(--accent); 
            font-size: 1.1rem; 
            display: block;
            margin-bottom: 10px;
        }

        /* Tense Card (for pattern display) */
        .tense-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 20px -8px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,180,216,0.3);
            transition: var(--transition);
            width: 100%;
            margin: 15px 0;
        }
        .tense-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -8px rgba(0,119,182,0.25);
            border-color: var(--primary);
        }

        /* Vocab List (for examples) */
        .vocab-list {
            list-style: none;
            padding: 0;
            width: 100%;
        }
        .vocab-list li {
            background: #f8f9fa;
            margin: 8px 0;
            padding: 12px 16px;
            border-radius: 40px;
            border-left: 6px solid var(--success);
            font-weight: 500;
            font-size: 0.95rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
        }
        .vocab-list li strong {
            color: var(--primary-dark);
            font-size: 1rem;
        }
        .vocab-list li em {
            color: var(--accent);
            font-style: normal;
            font-weight: 600;
            margin-left: 8px;
            display: inline-block;
        }

        /* Navigation Area */
        #navigationArea {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed var(--gray-300);
            text-align: center;
            width: 100%;
        }
        .nav-buttons { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 12px; 
            width: 100%;
        }
        .back-controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 15px;
            width: 100%;
        }

        /* Loading Animation */
        .loading {
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        /* Welcome Box */
        .welcome-box {
            text-align: center; 
            padding: 40px 20px; 
            background: linear-gradient(145deg, #f8f9fa, #ffffff); 
            border-radius: 24px; 
            margin: 20px 0;
            border: 1px solid rgba(0,180,216,0.2);
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px 15px;
            }
            h1 {
                font-size: 2rem;
            }
            h2 {
                font-size: 1.6rem;
            }
            .pattern-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .pattern-grid {
                grid-template-columns: 1fr;
            }
            .back-controls {
                flex-direction: column;
            }
        }
    </style>
</head>

                        ဥပမာ - <strong>Accept that he is clever.</strong> (သူတော်တယ်ဆိုတာကို လက်ခံလိုက်ပါ။)
                    </div>
                `
            }
        };


        // ---------- Page Order ----------
        const pageOrder = [
            'pattern1', 'pattern2', 'pattern3', 'pattern4', 'pattern5',
            'pattern6', 'pattern7', 'pattern8', 'pattern9', 'pattern10'
        ];

        // ---------- State Management ----------
        let currentPage = null;
        let lastMenuLevel = 'speakingPattern';

        // ---------- Main Functions ----------
        function showSpeakingPatternButtons() {
            const contentArea = document.getElementById('contentArea');
            const navigationArea = document.getElementById('navigationArea');
            
            // Hide main button
            const mainBtn = document.querySelector('.btn-speaking-main');
            if (mainBtn) mainBtn.style.display = 'none';
            
            // Show pattern grid
            contentArea.classList.add('loading');
            setTimeout(() => {
                contentArea.innerHTML = `
                    <h2>🎯 Speaking Patterns 1-10</h2>
                    <div style="text-align: center; margin-bottom: 20px;">
                        <p style="font-size: 1.1rem; color: #0077b6;">အောက်ပါ Pattern များကို နှိပ်၍ လေ့လာပါ</p>
                    </div>
                    <div class="pattern-grid">
                        <button class="btn-pattern" onclick="navigateTo('pattern1')">Pattern 1</button>
                        <button class="btn-pattern" onclick="navigateTo('pattern2')">Pattern 2</button>
                        <button class="btn-pattern" onclick="navigateTo('pattern3')">Pattern 3</button>
                        <button class="btn-pattern" onclick="navigateTo('pattern4')">Pattern 4</button>
                        <button class="btn-pattern" onclick="navigateTo('pattern5')">Pattern 5</button>
                        <button class="btn-pattern" onclick="navigateTo('pattern6')">Pattern 6</button>
                        <button class="btn-pattern" onclick="navigateTo('pattern7')">Pattern 7</button>
                        <button class="btn-pattern" onclick="navigateTo('pattern8')">Pattern 8</button>
                        <button class="btn-pattern" onclick="navigateTo('pattern9')">Pattern 9</button>
                        <button class="btn-pattern" onclick="navigateTo('pattern10')">Pattern 10</button>
                    </div>
                `;
                contentArea.classList.remove('loading');
                
                // Set navigation
                navigationArea.innerHTML = `
                    <div class="nav-buttons">
                        <button class="btn-back" onclick="goBackToMain()">🏠 Back to Main</button>
                    </div>
                `;
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 250);
        }

        function navigateTo(patternKey) {
            currentPage = patternKey;
            renderPage(patternKey);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderPage(patternKey) {
            const contentArea = document.getElementById('contentArea');
            const navigationArea = document.getElementById('navigationArea');
            const page = speakingPatternsData[patternKey];
            
            if (!page) return;

            contentArea.classList.add('loading');
            setTimeout(() => {
                contentArea.innerHTML = `<h2>${page.title}</h2>${page.content}`;
                contentArea.classList.remove('loading');

                const currentIdx = pageOrder.indexOf(patternKey);
                const prevKey = currentIdx > 0 ? pageOrder[currentIdx - 1] : null;
                const nextKey = currentIdx < pageOrder.length - 1 ? pageOrder[currentIdx + 1] : null;

                let navHtml = '<div class="nav-buttons">';

                // Previous and Next buttons
                if (prevKey) {
                    navHtml += `<button class="btn-back" onclick="navigateTo('${prevKey}')">← Previous</button>`;
                }
                if (nextKey) {
                    navHtml += `<button class="btn-back" onclick="navigateTo('${nextKey}')">Next →</button>`;
                }

                navHtml += '</div>';

                // Back to Pattern Menu and Main Menu buttons
                navHtml += `
                    <div class="back-controls">
                        <button class="btn-back" onclick="showSpeakingPatternButtons()">🔙 Back to Patterns</button>
                        <button class="btn-back" onclick="goBackToMain()">🏠 Main Menu</button>
                    </div>
                `;

                navigationArea.innerHTML = navHtml;
            }, 250);
        }

        function goBackToMain() {
            const contentArea = document.getElementById('contentArea');
            const navigationArea = document.getElementById('navigationArea');
            const mainBtn = document.querySelector('.btn-speaking-main');
            
            // Show main button
            if (mainBtn) mainBtn.style.display = 'block';
            
            // Clear content and show welcome message
            contentArea.innerHTML = `
                <div class="welcome-box">
                    <h3 style="color: #0077b6;">Welcome to Speaking Patterns!</h3>
                    <p style="font-size: 1.1rem; margin: 20px 0;">Click the button above to view all speaking patterns.</p>
                    <p style="font-size: 0.95rem; color: #666;">Pattern 1 to 10 - အင်္ဂလိပ်စကားပြောပုံစံများ</p>
                </div>
            `;
            navigationArea.innerHTML = '';
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ---------- Initial Setup ----------
        document.addEventListener('DOMContentLoaded', () => {
            const contentArea = document.getElementById('contentArea');
            
            // Show welcome message
            contentArea.innerHTML = `
                <div class="welcome-box">
                    <h3 style="color: #0077b6;">🗣️ Speaking Patterns 1-10</h3>
                    <p style="font-size: 1.1rem; margin: 20px 0;">အင်္ဂလိပ်စကားပြောပုံစံများကို လေ့လာရန် အောက်ပါခလုတ်ကို နှိပ်ပါ။</p>
                    <div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px;">
                        <span style="background: #00b4d8; color: white; padding: 8px 15px; border-radius: 30px;">Pattern 1</span>
                        <span style="background: #00b4d8; color: white; padding: 8px 15px; border-radius: 30px;">Pattern 2</span>
                        <span style="background: #00b4d8; color: white; padding: 8px 15px; border-radius: 30px;">Pattern 3</span>
                        <span style="background: #00b4d8; color: white; padding: 8px 15px; border-radius: 30px;">Pattern 4</span>
                        <span style="background: #00b4d8; color: white; padding: 8px 15px; border-radius: 30px;">Pattern 5</span>
                        <span style="background: #00b4d8; color: white; padding: 8px 15px; border-radius: 30px;">Pattern 6</span>
                        <span style="background: #00b4d8; color: white; padding: 8px 15px; border-radius: 30px;">Pattern 7</span>
                        <span style="background: #00b4d8; color: white; padding: 8px 15px; border-radius: 30px;">Pattern 8</span>
                        <span style="background: #00b4d8; color: white; padding: 8px 15px; border-radius: 30px;">Pattern 9</span>
                        <span style="background: #00b4d8; color: white; padding: 8px 15px; border-radius: 30px;">Pattern 10</span>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
